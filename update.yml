name: Update streaming domains

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths:
      - "lists/custom.txt"   # also trigger when you edit the custom list
      - "merge.py"
  workflow_dispatch:           # allow manual runs from the Actions tab

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to push the updated output file

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run merge script
        run: python merge.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streaming-domains.txt
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: update streaming domains [${TIMESTAMP}]"
            git push
          fi
